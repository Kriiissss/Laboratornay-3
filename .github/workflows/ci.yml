name: CI Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt # Устанавливаем все зависимости, включая DVC, flake8, black, pytest

    # --- CI шаги ---
   - name: Lint with flake8
      run: python -m flake8 src/ tests/

    - name: Format with black
      run: python -m black --check src/ tests/

    - name: Run unit tests
      run: python -m pytest tests/

    # --- CD шаг (сборка Docker-образа) ---
    - name: Build Docker image
      run: docker build -t my-ml-pipeline-app:latest . # Собирает Docker-образ