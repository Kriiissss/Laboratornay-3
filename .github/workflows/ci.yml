name: CI Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pytest dvc[gdrive] # Убедитесь, что здесь перечислены ВСЕ зависимости из requirements.txt

    # --- CI шаги ---
    - name: Lint with flake8
      run: flake8 src/ tests/ # Укажите пути к вашему коду

    - name: Format with black
      run: black --check src/ tests/ # Проверяет форматирование

    - name: Run unit tests
      run: pytest tests/ # Запускает модульные тесты

    # --- CD шаг (сборка Docker-образа) ---
    - name: Build Docker image
      run: docker build -t my-ml-pipeline-app:latest .